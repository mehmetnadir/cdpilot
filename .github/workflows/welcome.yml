name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            Thanks for your first PR! 🎉

            We'll review it soon. A few things we check:
            - Zero-dependency policy (stdlib + websockets only)
            - `python3 -m py_compile src/cdpilot.py` passes
            - `node test/test.js` passes
            - No breaking changes to existing commands
          issue-message: |
            Thanks for opening your first issue! 🙌
            We'll look into it. Meanwhile, feel free to check our [docs](https://cdpilot.ndr.ist/docs).
